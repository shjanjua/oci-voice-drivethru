<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Oracle Coffee — membership QR poster (A4, black &amp; white)</title>
<style>
  /* Mono edition of poster.html for black-and-white printers: same layout and
     brand language as the kiosk, rendered in pure black/white + light grays.
     No tinted fills or gradients (they band on laser printers); crisp borders
     carry the design instead. Large fills avoided to keep toner use low. */
  :root{
    --ink:#000; --muted:#4a4a4a; --faint:#8c8c8c; --line:#000; --grid:rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  @page{size:A4; margin:0}
  html,body{margin:0; padding:0}
  body{
    width:210mm; height:297mm; overflow:hidden;
    font-family:"Oracle Sans","Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
    background:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      #fff;
    background-size:9mm 9mm, 9mm 9mm, 100% 100%;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .shell{
    position:relative; width:calc(210mm - 16mm); height:calc(297mm - 16mm); margin:8mm;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:14mm 12mm 12mm; overflow:hidden;
    border:0.7mm solid var(--line); border-radius:8px; background:#fff;
  }
  .shell::before{
    content:""; position:absolute; top:-30mm; left:8mm; width:52mm; height:86mm; z-index:0;
    background:url('../../frontend/particles.svg') center/contain no-repeat;
    opacity:.10; transform:rotate(154deg); filter:grayscale(1) contrast(1.4);
  }
  .shell>*{position:relative; z-index:1}

  .brand-cluster{display:flex; align-items:center; gap:6mm; margin-top:2mm}
  .brand-mark{display:grid; place-items:center; width:17mm; height:17mm; border-radius:8px;
    color:#fff; background:#000; font-size:7mm; font-weight:800}
  .brand-text{text-align:left}
  .brand-title{margin:0; font-size:11.5mm; font-weight:850; line-height:1.05; color:var(--ink)}
  .brand-subtitle{margin:1.2mm 0 0; color:var(--muted); font-size:4.6mm; font-weight:700}

  /* the kiosk's idle waveform, frozen */
  .wave{display:flex; align-items:center; gap:1.6mm; height:8mm; margin:9mm 0 0}
  .wave i{width:1.9mm; border-radius:1mm; background:#000}
  .wave i:nth-child(1){height:3.2mm}.wave i:nth-child(2){height:5.4mm}
  .wave i:nth-child(3){height:7.6mm}.wave i:nth-child(4){height:5.8mm}
  .wave i:nth-child(5){height:7.2mm}.wave i:nth-child(6){height:4.4mm}
  .wave i:nth-child(7){height:3mm}

  h1{margin:8mm 0 0; color:var(--ink); font-size:13mm; font-weight:900; line-height:1.06;
     letter-spacing:-.2mm; max-width:160mm}
  .lede{margin:6mm 0 0; max-width:148mm; color:var(--muted); font-size:5.6mm; font-weight:650; line-height:1.5}
  .lede strong{color:var(--ink); font-weight:850}

  .qr-card{position:relative; margin:9mm 0 0; padding:7mm; border-radius:8px;
    background:#fff; border:0.5mm solid #000}
  .qr-card img{display:block; width:96mm; height:96mm}
  .qr-mark{position:absolute; inset:0; display:grid; place-items:center; pointer-events:none}
  .qr-mark span{display:grid; place-items:center; width:17mm; height:17mm; border-radius:8px;
    color:#fff; background:#000; font-size:7mm; font-weight:800;
    box-shadow:0 0 0 2.4mm #fff}

  .url-chip{display:inline-flex; align-items:center; margin-top:7mm; padding:3mm 7mm;
    border:0.5mm solid #000; border-radius:999px; color:var(--ink);
    background:#fff; font-size:5mm; font-weight:800}

  .footer{margin-top:auto; display:flex; align-items:center; gap:3mm;
    color:var(--muted); font-size:3.9mm; font-weight:700}
  .footer .dot{width:1.4mm; height:1.4mm; border-radius:50%; background:var(--faint)}
</style>
</head>
<body>
  <div class="shell">
    <div class="brand-cluster">
      <span class="brand-mark">AI</span>
      <div class="brand-text">
        <p class="brand-title">Oracle Coffee</p>
        <p class="brand-subtitle">Voice drive-thru ordering</p>
      </div>
    </div>

    <div class="wave"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <h1>Join our café membership</h1>

    <p class="lede">Scan the QR code to join our café membership for a
      <strong>personalised experience</strong> and a <strong>special birthday treat</strong>.</p>

    <div class="qr-card">
      <img src="qr-voice-order-bw.png" alt="QR code — scan to join the Oracle Coffee membership" />
      <div class="qr-mark"><span>AI</span></div>
    </div>

    <span class="url-chip">oracle-aicoe.com/voice-order</span>

    <div class="footer">
      <span>Free to join</span><span class="dot"></span>
      <span>Takes 30 seconds</span><span class="dot"></span>
      <span>We'll greet you by name</span>
    </div>
  </div>
</body>
</html>
